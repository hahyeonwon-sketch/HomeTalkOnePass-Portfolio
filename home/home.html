<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="ctx" th:content="@{/}">
    <link rel="stylesheet" th:href="@{/css/notification/notification.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

    <th:block th:if="${isLoggedIn}">
        <script th:src="@{/js/notification/notification-sse.js}"></script>
        <script th:src="@{/js/notification/notification-bell.js}"></script>
    </th:block>
    <title>홈 | Forest Lium</title>
    <link rel="stylesheet" th:href="@{/css/dashboard/style.css}">
    <link rel="stylesheet" th:href="@{/css/home/home.css}">
</head>

<body>

<div class="main-layout" style="display:flex; min-height:100vh;">

    <div th:replace="~{fragments/sidebar :: sidebar(currentPage='home')}"></div>

    <div class="main-wrapper" style="flex:1; min-width:0; display:flex; flex-direction:column;">

        <!-- ════════ 상단 네브바 ════════ -->
        <nav style="
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 clamp(20px, 5vw, 60px);
            height: 56px;
            background: white;
            border-bottom: 1px solid #E2E8F0;
        ">
            <div style="display: flex; align-items: center; gap: 12px;">
                <th:block th:if="${#authorization.expression('isAuthenticated()')}">
                    <a th:href="@{/notification}" class="nav-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                        </svg>
                    </a>
                    <a th:href="@{/myPage}" class="nav-btn">MyPage</a>
                    <a th:href="@{/auth/logout}" class="nav-btn">로그아웃</a>
                </th:block>
            </div>
        </nav>

        <!-- ════════ 배너 ════════ -->
        <section class="banner">
            <img th:src="@{/images/banner.png}" alt="포레스트 리움 단지 전경"
                 onerror="this.style.display='none'" />
            <div class="banner-overlay">
                <div class="banner-text">
                    <h1>안녕하세요,<br>HomeTalk OnePass입니다.</h1>
                    <p>포레스트 리움 단지 내 소식과 정보를<br>편리하게 이용하세요.</p>
                </div>
            </div>
        </section>

        <!-- ════════ 정보 카드 3단 ════════ -->
        <div class="container">
            <div class="info-grid">

                <!-- 공지사항 -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-header-left">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                            </svg>
                            공지사항
                        </span>
                        <button class="more-btn" onclick="goService('notice')">
                            더보기
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                    <ul class="notice-list" id="notice-list">
                        <li><div class="skeleton-wrap"><div class="skeleton-line long"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></li>
                    </ul>
                </div>

                <!-- 오늘의 일정 -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-header-left">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                <line x1="16" y1="2" x2="16" y2="6"/>
                                <line x1="8" y1="2" x2="8" y2="6"/>
                                <line x1="3" y1="10" x2="21" y2="10"/>
                            </svg>
                            오늘의 일정
                        </span>
                    </div>
                    <ul class="schedule-list" id="schedule-list">
                        <li><div class="skeleton-wrap"><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></li>
                    </ul>
                </div>

                <!-- 커뮤니티 -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-header-left">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                            </svg>
                            커뮤니티
                        </span>
                        <button class="more-btn" onclick="goService('community')">
                            더보기
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                    <ul class="community-list" id="community-list">
                        <li><div class="skeleton-wrap"><div class="skeleton-line long"></div><div class="skeleton-line medium"></div></div></li>
                    </ul>
                    <div class="login-prompt" id="login-prompt" style="display:none;">
                        <span class="login-prompt-text">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            로그인 후 전체 게시글을 확인할 수 있어요
                        </span>
                        <button class="login-prompt-btn" onclick="goService('community')">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                                <polyline points="10 17 15 12 10 7"/>
                                <line x1="15" y1="12" x2="3" y2="12"/>
                            </svg>
                            로그인하기
                        </button>
                    </div>
                </div>

            </div>

            <!-- ════════ 주요 서비스 ════════ -->
            <p class="section-title">주요 서비스</p>
            <div class="service-grid">

                <div class="service-card" onclick="goService('civil')">
                    <div class="service-icon icon-civil">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                            <rect x="9" y="3" width="6" height="4" rx="2"/>
                            <line x1="9" y1="12" x2="15" y2="12"/>
                            <line x1="9" y1="16" x2="12" y2="16"/>
                        </svg>
                    </div>
                    <span class="service-name">입주민지원</span>
                    <span class="service-desc">민원 신청 및 처리 현황을<br>확인하세요.</span>
                </div>

                <div class="service-card" onclick="goService('facility')">
                    <div class="service-icon icon-facility">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 20h20"/>
                            <path d="M4 20V8l8-6 8 6v12"/>
                            <path d="M9 20v-5h6v5"/>
                            <circle cx="12" cy="11" r="1"/>
                        </svg>
                    </div>
                    <span class="service-name">시설예약</span>
                    <span class="service-desc">단지 내 다양한 시설을<br>예약할 수 있어요.</span>
                </div>

                <div class="service-card" onclick="goService('billing')">
                    <div class="service-icon icon-billing">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="5" width="20" height="14" rx="2"/>
                            <line x1="2" y1="10" x2="22" y2="10"/>
                            <line x1="7" y1="15" x2="7.01" y2="15"/>
                            <line x1="11" y1="15" x2="13" y2="15"/>
                        </svg>
                    </div>
                    <span class="service-name">관리비 조회</span>
                    <span class="service-desc">관리비 내역을<br>간편하게 조회하세요.</span>
                </div>

                <div class="service-card" onclick="goService('parking')">
                    <div class="service-icon icon-parking">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="1" y="3" width="15" height="13" rx="2"/>
                            <path d="M16 8h4l3 3v5h-7V8z"/>
                            <circle cx="5.5" cy="18.5" r="2.5"/>
                            <circle cx="18.5" cy="18.5" r="2.5"/>
                        </svg>
                    </div>
                    <span class="service-name">주차</span>
                    <span class="service-desc">주차 등록 및 방문 차량<br>이용을 확인하세요.</span>
                </div>

                <div class="service-card" onclick="goService('community')">
                    <div class="service-icon icon-community">
                        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </div>
                    <span class="service-name">커뮤니티</span>
                    <span class="service-desc">이웃과 소통하고<br>정보를 나눠요.</span>
                </div>

            </div>
        </div>

        <!-- 토스트 -->
        <div id="toast"></div>

        <footer th:replace="~{fragments/footer :: footer}"></footer>

    </div>
</div>

<script th:inline="javascript">
    window.IS_LOGGED_IN = [[${isLoggedIn}]];
    window.IS_ADMIN = [[${isAdmin}]];
    window.USER_ROLE = [[${userRole}]];
    window.AUTH_ALERT = [[${authAlert}]];
</script>
<script th:src="@{/js/home/home.js}"></script>
</body>
</html>
