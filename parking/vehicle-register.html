<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('입주자 차량 등록')}"></head>
<link rel="stylesheet" th:href="@{/css/parking/parking-common.css}">
<link rel="stylesheet" th:href="@{/css/parking/parking-resident.css}">
<body>

<div class="main-layout" style="display: flex; min-height: 100vh;">

  <!-- 1. 왼쪽 사이드바 -->
  <div th:replace="~{fragments/sidebar :: sidebar(currentPage='parking')}"></div>

  <!-- 2. 오른쪽 영역 (헤더 + 본문) -->
  <div class="main-wrapper" style="flex: 1; display: flex; flex-direction: column;">

    <!-- 상단 헤더 -->
    <div th:replace="~{fragments/headerCurrentMenuView :: path(paths=${ {'parking', 'status', 'register'} })}"></div>

    <!-- 상단 메뉴 -->
    <div th:replace="~{fragments/headerCategoryMenu :: parking}"></div>

    <!-- 메인 콘텐츠 -->
    <main class="content" style="flex: 1;">
      <div class="container">
        <h2 class="page-title">입주자 차량 등록</h2>

        <!-- 안내 멘트 -->
        <div style="background-color: #f0f5ff; border: 1px solid #d0dff8; border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; font-size: 13px; color: #3C6ABC; display: flex; align-items: flex-start; gap: 8px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3C6ABC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 2px;">
            <path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/>
            <path d="M12 8v4"/>
            <path d="M12 16h.01"/>
          </svg>
          <span>
        세대당 <strong>1대</strong>는 무료로 등록 가능합니다.<br>
        2대 이상 등록을 원하시면 관리사무소로 문의해 주세요.
    </span>
        </div>

        <form id="vehicleForm" th:action="@{/parking/vehicle/register}" method="post" enctype="multipart/form-data">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

          <!-- 차량 번호 -->
          <div class="form-group">
            <label for="vehicleNumber">차량 번호</label>
            <input
                    type="text"
                    id="vehicleNumber"
                    name="vehicleNumber"
                    placeholder="예) 000가 0000"
                    maxlength="10"
            >
            <span class="error-msg" id="vehicleNumberError"></span>
          </div>
          <!-- 에러 메시지 -->
          <div th:if="${errorMessage}"
               style="color: var(--color-btn-point); font-size: 13px; margin-bottom: 16px;"
               th:text="${errorMessage}">
          </div>

          <!-- 차량 모델 -->
          <div class="form-group">
            <label for="vehicleModel">차량 모델</label>
            <input
                    type="text"
                    id="vehicleModel"
                    name="model"
                    placeholder="예) 아반떼"
            >
          </div>

          <!-- 차량 종류 -->
          <div class="form-group">
            <label>차량 종류</label>
            <div class="vehicle-type-group">
              <button type="button" class="type-btn" data-type="경차">경차</button>
              <button type="button" class="type-btn" data-type="승용차">승용차</button>
              <button type="button" class="type-btn" data-type="SUV">SUV</button>
              <button type="button" class="type-btn" data-type="전기차">전기차</button>
              <button type="button" class="type-btn" data-type="대형">대형</button>
              <button type="button" class="type-btn" data-type="기타">기타</button>
            </div>
            <input type="hidden" id="vehicleType" name="vehicleType">
            <span class="error-msg" id="vehicleTypeError"></span>
            <p class="hint">*해당 차량 종류를 선택해주세요</p>
          </div>

          <!-- 필수 서류 -->
          <div class="form-group">
            <label>필수 서류</label>
            <p class="hint">
              &lt;필요 서류&gt;<br>
              * 자동차등록증<br>
              * 가족관계증명서<br>
              * 경우에 따라 서류를 더 요청할 수 있습니다.
            </p>
            <div class="file-upload-box">
              <table id="fileTable">
                <thead>
                <tr>
                  <th><input type="checkbox" id="checkAll"></th>
                  <th>파일 이름</th>
                  <th>크기</th>
                  <th>확장자</th>
                </tr>
                </thead>
                <tbody id="fileList"></tbody>
              </table>
              <div class="file-actions">
                <button type="button" id="addFileBtn">파일 추가</button>
                <button type="button" id="removeFileBtn">항목 제거</button>
                <button type="button" id="removeAllFileBtn">전체 항목 제거</button>
              </div>
              <input type="file" id="fileInput" name="documents"
                     accept=".jpg,.jpeg,.pdf" multiple hidden>
            </div>
            <span class="error-msg" id="fileError"></span>
            <p class="hint">*등록증 미첨부 시 승인이 거절될 수 있습니다.</p>
          </div>

          <!-- 제출 버튼 -->
          <div class="form-actions">
            <button type="submit" id="submitBtn" class="btn-primary">제출</button>
          </div>

        </form>
      </div>
    </main>

    <!-- 하단 푸터 삽입 -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

  </div>
</div>

<script th:inline="javascript">
  const uploadedFiles = [];
  const fileInput = document.getElementById('fileInput');
  const fileList = document.getElementById('fileList');
  const fileError = document.getElementById('fileError');
  const vehicleNumberInput = document.getElementById('vehicleNumber');
  const vehicleModelInput = document.getElementById('vehicleModel');
  const vehicleNumberError = document.getElementById('vehicleNumberError');
  const vehicleTypeInput = document.getElementById('vehicleType');
  const vehicleTypeError = document.getElementById('vehicleTypeError');
  const vehicleNumberRegex = /^\d{2,3}[가-힣]\d{4}$/;
  const allowedExtensions = ['jpg', 'jpeg', 'pdf'];
  const allowedMimeTypes = ['image/jpeg', 'application/pdf'];
  const contextPath = /*[[@{/}]]*/ '/';
  let isSubmitting = false;

  // 차량 번호 실시간 검증
  vehicleNumberInput.addEventListener('input', () => {
      const value = vehicleNumberInput.value
          .replace(/\s/g, '')
          .toUpperCase();
      vehicleNumberInput.value = value;

      if (value && !vehicleNumberRegex.test(value)) {
          vehicleNumberError.textContent = '올바른 차량 번호 형식이 아닙니다. (예: 123가4567)';
      } else {
          vehicleNumberError.textContent = '';
      }
      checkSubmitBtn();
  });

  // 차량 번호 중복 체크 (포커스 아웃 시)
  vehicleNumberInput.addEventListener('blur', () => {
      const value = vehicleNumberInput.value.replace(/\s/g, '');
      if (!vehicleNumberRegex.test(value)) return;

      fetch(`${contextPath}parking/vehicle/check?vehicleNumber=${value}`)
          .then(res => res.json())
          .then(data => {
              if (data.exists) {
                  vehicleNumberError.textContent = '이미 등록된 차량 번호입니다.';
                  document.getElementById('submitBtn').disabled = true;
              }
          })
          .catch(err => console.error(err));
  });

  // 차량 모델 공백 처리
  vehicleModelInput.addEventListener('input', () => {
      vehicleModelInput.value = vehicleModelInput.value.trim();
  });

  // 차량 종류 선택
  const typeBtns = document.querySelectorAll('.type-btn');
  typeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
          typeBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          vehicleTypeInput.value = btn.dataset.type;
          vehicleTypeError.textContent = '';
          checkSubmitBtn();
      });
  });

  // 파일 추가 버튼
  document.getElementById('addFileBtn').addEventListener('click', () => fileInput.click());

  // 파일 선택 시
  fileInput.addEventListener('change', () => {
      const files = Array.from(fileInput.files);

      files.forEach(file => {
          const ext = file.name.split('.').pop().toLowerCase();

          if (uploadedFiles.some(f => f.name === file.name)) {
              fileError.textContent = `"${file.name}"은 이미 추가된 파일입니다.`;
              return;
          }

          if (!allowedExtensions.includes(ext)) {
              fileError.textContent = 'jpg, pdf 파일만 업로드 가능합니다.';
              return;
          }

          if (!allowedMimeTypes.includes(file.type)) {
              fileError.textContent = '올바르지 않은 파일 형식입니다.';
              return;
          }

          fileError.textContent = '';
          uploadedFiles.push(file);

          const row = document.createElement('tr');
          row.innerHTML = `
              <td><input type="checkbox" class="fileCheck"></td>
              <td>${file.name}</td>
              <td>${(file.size / 1024).toFixed(1)} KB</td>
              <td>${ext.toUpperCase()}</td>
          `;
          fileList.appendChild(row);
      });

      syncFileInput();
      checkSubmitBtn();
  });

  function syncFileInput() {
      const dt = new DataTransfer();
      uploadedFiles.forEach(file => dt.items.add(file));
      fileInput.files = dt.files;
  }

  document.getElementById('removeFileBtn').addEventListener('click', () => {
      const rows = Array.from(fileList.querySelectorAll('tr'));
      const toRemove = [];

      rows.forEach((row, index) => {
          const checkbox = row.querySelector('.fileCheck');
          if (checkbox && checkbox.checked) {
              toRemove.push(index);
          }
      });

      toRemove.reverse().forEach(index => {
          uploadedFiles.splice(index, 1);
          rows[index].remove();
      });

      syncFileInput();
      checkSubmitBtn();
  });

  document.getElementById('removeAllFileBtn').addEventListener('click', () => {
      fileList.innerHTML = '';
      uploadedFiles.length = 0;
      syncFileInput();
      checkSubmitBtn();
  });

  document.getElementById('checkAll').addEventListener('change', (e) => {
      document.querySelectorAll('.fileCheck').forEach(cb => cb.checked = e.target.checked);
  });

  function checkSubmitBtn() {
      const vehicleNumber = vehicleNumberInput.value.replace(/\s/g, '');
      const vehicleType = vehicleTypeInput.value;
      const hasFile = uploadedFiles.length > 0;
      const isValidNumber = vehicleNumberRegex.test(vehicleNumber);

      document.getElementById('submitBtn').disabled =
          !(isValidNumber && vehicleType && hasFile);
  }

  // 폼 제출 (중복 제출 방지)
  document.getElementById('vehicleForm').addEventListener('submit', (e) => {
      if (isSubmitting) {
          e.preventDefault();
          return;
      }
      if (!vehicleTypeInput.value) {
          e.preventDefault();
          vehicleTypeError.textContent = '차량 종류를 선택해주세요.';
          return;
      }
      if (uploadedFiles.length === 0) {
          e.preventDefault();
          fileError.textContent = '필수 서류를 첨부해주세요.';
          return;
      }
      isSubmitting = true;
      document.getElementById('submitBtn').disabled = true;
  });
</script>

</body>
</html>
