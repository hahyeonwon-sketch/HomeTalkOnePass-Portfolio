<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('방문 차량 관리')}"></head>
<link rel="stylesheet" th:href="@{/css/parking/parking-common.css}">
<link rel="stylesheet" th:href="@{/css/parking/parking-resident.css}">
<body>
<div class="main-layout">
    <!-- 1. 왼쪽 사이드바 (currentPage='parking' 설정) -->
    <div th:replace="~{fragments/sidebar :: sidebar(currentPage='parking')}"></div>

    <!-- 2. 오른쪽 영역 (헤더 + 본문) -->
    <div class="main-wrapper">

        <!-- 상단 헤더 경로 표시 -->
        <div th:replace="~{fragments/headerCurrentMenuView :: path(paths='parking')}"></div>

        <!-- 상단 카테고리 메뉴 (parking 전용 메뉴) -->
        <div th:replace="~{fragments/headerCategoryMenu :: parking}"></div>

        <!-- 본문 컨텐츠 -->
        <main class="content" style="flex:1;">
            <div class="container">
                <h2 class="page-title">방문 차량 관리</h2>

                <!-- 안내 멘트 -->
                <div style="background-color: #f0f5ff; border: 1px solid #d0dff8; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #3C6ABC; display: flex; align-items: flex-start; gap: 8px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3C6ABC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 2px;">
                        <path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/>
                        <path d="M12 8v4"/>
                        <path d="M12 16h.01"/>
                    </svg>
                    <span>
                    주차 중인 미등록 차량을 <strong>내 세대 방문 차량</strong>으로 등록할 수 있습니다.<br>
                    출차 전 <strong>티켓 등록</strong> 페이지에서 티켓을 적용해 주세요.
                    </span>
                </div>

                <!-- 차량 번호 검색 -->
                <div class="form-group">
                    <label for="vehicleNumber">차량 번호</label>
                    <div class="search-group">
                        <input type="text" id="vehicleNumber" placeholder="차량 번호 입력" maxlength="8">
                        <button type="button" id="searchBtn" onclick="searchVehicle()">조회</button>
                    </div>
                    <span class="error-msg" id="searchError"></span>
                </div>

                <!-- 검색 결과 리스트 -->
                <div id="searchResult" style="display:none;">
                    <ul id="vehicleList"></ul>
                </div>

                <!-- 입차 등록 버튼 -->
                <div class="form-actions" id="registerBtnBox" style="display:none;">
                    <button type="button" id="registerBtn" disabled onclick="registerVehicle()">내 방문자로 등록</button>
                </div>
            </div>
        </main>

        <!-- 하단 푸터 삽입 -->
        <footer th:replace="~{fragments/footer :: footer}"></footer>

    </div> <!-- .main-wrapper 닫기 -->
</div> <!-- .main-layout 닫기 -->

<script th:inline="javascript">
    const contextPath = /*[[@{/}]]*/ '/';
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    let selectedReservationId = null;

    // URL 파라미터에서 차량 번호 추출 및 자동 입력 (Redundant 경고 해결 버전)
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const vehicleNumber = params.get('vehicleNumber');
        if (vehicleNumber) {
            // 변수 선언 없이 바로 대입하여 72행 경고 해결
            document.getElementById('vehicleNumber').value = vehicleNumber.replace(/\s/g, '');
            searchVehicle();
        }
    };

    // 최대 8자 제한
    document.getElementById('vehicleNumber').addEventListener('input', (e) => {
        if (e.target.value.length > 8) e.target.value = e.target.value.slice(0, 8);
    });

    // 엔터키로 조회
    document.getElementById('vehicleNumber').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') searchVehicle();
    });

    // 차량 조회 로직
    function searchVehicle() {
        const keyword = document.getElementById('vehicleNumber').value.trim();
        const searchError = document.getElementById('searchError');

        if (keyword.length < 1) {
            searchError.textContent = '차량 번호를 입력해주세요.';
            return;
        }
        searchError.textContent = '';

        fetch(`${contextPath}parking/unregistered/search?keyword=${encodeURIComponent(keyword)}`)
            .then(async res => {
                if (!res.ok) {
                    const msg = await res.text();
                    throw new Error(msg || '서버 오류');
                }
                return res.json();
            })
            .then(data => {
                const vehicleList = document.getElementById('vehicleList');
                const searchResult = document.getElementById('searchResult');
                const registerBtnBox = document.getElementById('registerBtnBox');
                vehicleList.innerHTML = '';
                selectedReservationId = null;
                document.getElementById('registerBtn').disabled = true;

                if (data.length === 0) {
                    searchError.textContent = '조회된 차량이 없습니다.';
                    searchResult.style.display = 'none';
                    registerBtnBox.style.display = 'none';
                    return;
                }

                searchResult.style.display = 'block';
                registerBtnBox.style.display = 'flex';

                data.forEach(vehicle => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <label>
                            <input type="radio" name="vehicleSelect"
                                   value="${vehicle.reservationId}"
                                   onchange="selectVehicle(${vehicle.reservationId})">
                            ${vehicle.vehicleNumber} (${vehicle.purpose} · ${vehicle.enteredAt})
                        </label>
                    `;
                    vehicleList.appendChild(li);
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('searchError').textContent = '조회 중 오류가 발생했습니다.';
                document.getElementById('registerBtnBox').style.display = 'none';
            });
    }

    function selectVehicle(reservationId) {
        selectedReservationId = reservationId;
        document.getElementById('registerBtn').disabled = false;
    }

    function registerVehicle() {
        if (!selectedReservationId) return;
        if (!confirm('해당 차량을 우리 세대 방문 차량으로 등록하시겠습니까?')) return;

        const btn = document.getElementById('registerBtn');
        btn.disabled = true;

        fetch(`${contextPath}parking/unregistered/match`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken
            },
            body: JSON.stringify({ reservationId: selectedReservationId })
        })
            .then(async res => {
                if (!res.ok) {
                    const msg = await res.text();
                    throw new Error(msg || '서버 오류');
                }
                alert('방문 차량 등록이 완료되었습니다.');
                document.getElementById('vehicleNumber').value = '';
                document.getElementById('vehicleList').innerHTML = '';
                document.getElementById('searchResult').style.display = 'none';
                document.getElementById('registerBtnBox').style.display = 'none';
                document.getElementById('searchError').textContent = '';
                selectedReservationId = null;
            })
            .catch(err => {
                console.error(err);
                alert('등록 처리 중 오류가 발생했습니다.');
            })
            .finally(() => {
                btn.disabled = false;
            });
    }
</script>
</body>
</html>
