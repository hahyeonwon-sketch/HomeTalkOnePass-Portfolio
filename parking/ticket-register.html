<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('차량 티켓 등록')}"></head>
<link rel="stylesheet" th:href="@{/css/parking/parking-common.css}">
<link rel="stylesheet" th:href="@{/css/parking/parking-resident.css}">
<body>

<div class="main-layout">

  <!-- 1. 사이드바 -->
  <div th:replace="~{fragments/sidebar :: sidebar(currentPage='parking')}"></div>

  <!-- 2. 오른쪽 영역 -->
  <div class="main-wrapper">

    <!-- 상단 헤더 -->
    <div th:replace="~{fragments/headerCurrentMenuView :: path(paths='parking')}"></div>

    <!-- 상단 메뉴 -->
    <div th:replace="~{fragments/headerCategoryMenu :: parking}"></div>

    <!-- 본문 -->
    <main class="content" style="flex:1;">
      <div class="container">
        <h2 class="page-title">차량 티켓 등록</h2>

        <!-- 잔여 티켓 현황 -->
        <div class="time-calc-box" style="margin-bottom: 24px;">
          <div class="time-item">
            <span class="time-label">이번 달 1일권</span>
            <span class="time-value">
              <span th:each="ticket : ${tickets}" th:if="${ticket.ticketType == 'DAY'}"
                    th:text="${ticket.remainingCount} + '개'">0개</span>
              <span th:if="${#lists.isEmpty(tickets)}">0개</span>
            </span>
          </div>
          <div class="time-item">
            <span class="time-label">이번 달 1시간권</span>
            <span class="time-value">
              <span th:each="ticket : ${tickets}" th:if="${ticket.ticketType == 'HOUR'}"
                    th:text="${ticket.remainingCount} + '개'">0개</span>
              <span th:if="${#lists.isEmpty(tickets)}">0개</span>
            </span>
          </div>
        </div>

        <!-- 차량 번호 검색 -->
        <div class="form-group">
          <label for="vehicleNumber">차량 번호</label>
          <div class="search-group">
            <input type="text" id="vehicleNumber" placeholder="차량 번호 입력" maxlength="8">
            <button type="button" id="searchBtn" onclick="searchVehicle()">조회</button>
          </div>
          <span class="error-msg" id="searchError"></span>
        </div>

        <!-- 차량 선택 목록 -->
        <div id="vehicleSelectBox" style="display:none; margin-bottom: 16px;">
          <p style="font-size: 14px; font-weight: 600; color: var(--color-main); margin-bottom: 8px;">
            조회된 차량을 선택해주세요.
          </p>
          <div id="vehicleSelectList"></div>
        </div>

        <!-- 검색 결과 -->
        <div id="searchResult" style="display:none;">

          <!-- 차량 정보 -->
          <div class="vehicle-info-box">
            <p><span class="label">차량번호</span><span id="resultVehicleNumber"></span></p>
            <p><span class="label">입차일시</span><span id="resultEntryTime"></span></p>
            <p><span class="label">주차시간</span><span id="resultParkingTime"></span></p>

            <div id="unregisteredBox" style="display:none;">
              <span class="warning">*미등록된 차량입니다. →</span>
              <button type="button" onclick="goRegister()">내 손님으로 등록하기</button>
            </div>

            <!-- 내 손님 해제 버튼 -->
            <div id="unmatchBox" style="display:none;">
              <span class="warning">*내 손님으로 등록된 차량입니다. →</span>
              <button type="button" onclick="unmatchHousehold()">내 손님 해제</button>
            </div>
          </div>

          <!-- 주차 시간 계산 -->
          <div class="time-calc-box">
            <div class="time-item">
              <span class="time-label">주차 시간</span>
              <span id="totalTime" class="time-value"></span>
            </div>
            <div class="time-item">
              <span class="time-label">적용 시간</span>
              <span id="appliedTime" class="time-value"></span>
            </div>
            <div class="time-item">
              <span class="time-label">잔여 시간</span>
              <span id="remainingTime" class="time-value"></span>
            </div>
            <div class="time-item" id="neededTimeBox" style="flex-direction: column; align-items: center;">
              <span class="time-label" style="color: var(--color-btn-point);">티켓 필요 시간</span>
              <span id="neededTime" class="time-value" style="color: var(--color-btn-point);">-</span>
              <span id="neededTimeMsg" style="font-size:12px; margin-top:4px;"></span>
            </div>
          </div>

          <!-- 티켓 적용 -->
          <div class="ticket-section">
            <label>티켓 적용</label>
            <p class="hint">*적용할 티켓을 선택해주세요</p>

            <div class="ticket-list">
              <div class="ticket-item">
                <label>
                  <input type="radio" name="ticketType" value="DAY" onchange="selectTicket('DAY')">
                  1일권
                </label>
                <span id="dayRemaining"></span>
                <button type="button" style="display:none;"
                        id="dayCancelBtn" onclick="openCancelModal('DAY', this)">적용 취소</button>
              </div>

              <div class="ticket-item">
                <label>
                  <input type="radio" name="ticketType" value="HOUR" onchange="selectTicket('HOUR')">
                  1시간권
                </label>
                <span id="hourRemaining"></span>
                <button type="button" style="display:none;"
                        id="hourCancelBtn" onclick="openCancelModal('HOUR', this)">적용 취소</button>
              </div>
            </div>

            <div class="ticket-apply-group">
              <button type="button" onclick="decreaseCount()">-</button>
              <input
                      type="number"
                      id="ticketCount"
                      value="1"
                      min="1"
                      style="width: 50px; text-align: center; font-size: 16px; font-weight: 700;
                       color: var(--color-main); border: 1px solid var(--color-border);
                       border-radius: var(--radius-sm); padding: 4px 8px;"
                      oninput="handleCountInput(this)"
              >
              <button type="button" onclick="increaseCount()">+</button>
              <button type="button" id="applyBtn" disabled onclick="applyTicket(this)">적용</button>
            </div>
            <p class="hint">*숫자를 직접 클릭하여 수량을 입력할 수 있습니다.</p>
            <p class="hint" id="ticketHint"></p>
          </div>
        </div>

      </div>
    </main>

    <!-- 하단 푸터 -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

  </div>
</div>

<!-- 티켓 취소 모달 -->
<div id="cancelModal" style="display:none; position:fixed; inset:0; background:rgba(3,33,84,0.45); z-index:1000; align-items:center; justify-content:center;">
  <div class="modal-content">
    <h3 id="cancelModalTitle">티켓 취소</h3>
    <p style="font-size:14px; color:var(--color-text); margin-bottom: 16px;">
      취소할 수량을 선택해주세요. (최대 <span id="cancelMaxCount"></span>장)
    </p>
    <div class="ticket-apply-group">
      <button type="button" onclick="decreaseCancelCount()">-</button>
      <input type="number" id="cancelCount" value="1" min="1"
             style="width:50px; text-align:center; font-size:16px; font-weight:700;
                    color:var(--color-main); border:1px solid var(--color-border);
                    border-radius:var(--radius-sm); padding:4px 8px;">
      <button type="button" onclick="increaseCancelCount()">+</button>
    </div>
    <div class="modal-actions" style="margin-top: 16px;">
      <button type="button" class="btn-ghost" onclick="closeCancelModal()">취소</button>
      <button type="button" class="pk-btn pk-btn-point" onclick="confirmCancel()">확인</button>
    </div>
  </div>
</div>

<script th:inline="javascript">
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
  const contextPath = /*[[@{/}]]*/ '/';
</script>

<script>
  const unregisteredBox = document.getElementById('unregisteredBox');
  const unmatchBox = document.getElementById('unmatchBox');

  let selectedParkingId = null;
  let selectedTicketType = null;
  let ticketCount = 1;
  let maxCount = 0;
  let dayRemainingCount = 0;
  let hourRemainingCount = 0;
  let dayAppliedCount = 0;
  let hourAppliedCount = 0;
  let cancelType = null;
  let cancelMaxCount = 0;
  let cancelBtn = null;
  let currentNeededTime = null;

  document.getElementById('vehicleNumber').addEventListener('input', (e) => {
    if (e.target.value.length > 8) e.target.value = e.target.value.slice(0, 8);
    if (e.target.value.trim() === '') {
      document.getElementById('searchResult').style.display = 'none';
      document.getElementById('vehicleSelectBox').style.display = 'none';
      document.getElementById('vehicleSelectList').innerHTML = '';
      loadMyVehicles();
    }
  });

  document.getElementById('vehicleNumber').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchVehicle();
  });

  function searchVehicle() {
    const keyword = document.getElementById('vehicleNumber').value.trim();
    const searchError = document.getElementById('searchError');

    if (keyword.length < 1) {
      searchError.textContent = '차량 번호를 입력해주세요.';
      return;
    }
    searchError.textContent = '';

    document.getElementById('vehicleSelectBox').style.display = 'none';
    document.getElementById('searchResult').style.display = 'none';
    document.getElementById('vehicleSelectList').innerHTML = '';

    fetch(`${contextPath}parking/ticket/search?keyword=${keyword}`)
      .then(async res => {
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.message || '조회된 차량이 없습니다.');
        }
        return res.json();
      })
      .then(data => {
        if (!data || data.length === 0) {
          searchError.textContent = '조회된 차량이 없습니다.';
          return;
        }

        if (data.length === 1) {
          renderTicketUI(data[0]);
          return;
        }

        const selectList = document.getElementById('vehicleSelectList');
        data.forEach(vehicle => {
          const div = document.createElement('div');
          div.classList.add('result-item');
          div.innerHTML = `
            <p style="margin: 0;">
              <strong>${vehicle.vehicleNumber}</strong>
              &nbsp;|&nbsp; 입차 ${vehicle.entryTime}
              &nbsp;|&nbsp; 주차 ${vehicle.parkingTime}
              ${vehicle.unregistered ? '&nbsp;|&nbsp; <span style="color:var(--color-btn-point);">미등록 차량</span>' : ''}
            </p>
          `;
          div.addEventListener('click', () => {
            document.getElementById('vehicleSelectBox').style.display = 'none';
            renderTicketUI(vehicle);
          });
          selectList.appendChild(div);
        });

        document.getElementById('vehicleSelectBox').style.display = 'block';
      })
      .catch(err => {
        console.error(err);
        searchError.textContent = err.message || '조회된 차량이 없습니다.';
        document.getElementById('searchResult').style.display = 'none';
      });
  }

  function refreshCurrentVehicle() {
    const currentParkingId = selectedParkingId;

    fetch(`${contextPath}parking/ticket/my-vehicles`)
      .then(res => res.json())
      .then(data => {
        const current = data.find(v => v.parkingId === currentParkingId);
        if (current) renderTicketUI(current);
      })
      .catch(err => console.error(err));
  }

  function renderTicketUI(data) {
    selectedParkingId = data.parkingId;

    document.getElementById('resultVehicleNumber').textContent = data.vehicleNumber;
    document.getElementById('resultEntryTime').textContent = data.entryTime;
    document.getElementById('resultParkingTime').textContent = data.parkingTime;
    document.getElementById('totalTime').textContent = data.totalTime;
    document.getElementById('appliedTime').textContent = data.appliedTime;
    document.getElementById('remainingTime').textContent = data.remainingTime;
    document.getElementById('neededTime').textContent = data.neededTime ?? '0분';
    currentNeededTime = data.neededTime ?? '0분';

    dayRemainingCount = data.dayRemaining ?? 0;
    hourRemainingCount = data.hourRemaining ?? 0;
    dayAppliedCount = data.dayAppliedCount ?? 0;
    hourAppliedCount = data.hourAppliedCount ?? 0;

    document.getElementById('dayRemaining').textContent = `이번 달 남은 티켓 ${dayRemainingCount}개`;
    document.getElementById('hourRemaining').textContent = `이번 달 남은 티켓 ${hourRemainingCount}개`;

    // 미등록 차량 박스
    unregisteredBox.style.display = data.unregistered ? 'block' : 'none';

    // 내 손님 해제 박스 (수동 입차 + 세대 매칭 완료)
    unmatchBox.style.display = data.manualMatched ? 'block' : 'none';

    // 미등록 차량은 티켓 적용 비활성화
    const ticketSection = document.querySelector('.ticket-section');
    if (data.unregistered) {
      ticketSection.style.opacity = '0.4';
      ticketSection.style.pointerEvents = 'none';
      document.getElementById('ticketHint').textContent = '*미등록 차량은 티켓을 적용할 수 없습니다.';
      document.getElementById('ticketHint').style.color = 'var(--color-btn-point)';
    } else {
      ticketSection.style.opacity = '1';
      ticketSection.style.pointerEvents = 'auto';
      document.getElementById('ticketHint').textContent = '';
      document.getElementById('ticketHint').style.color = '';
    }

    const dayCancelBtn = document.getElementById('dayCancelBtn');
    const hourCancelBtn = document.getElementById('hourCancelBtn');

    if (data.dayApplied) {
      dayCancelBtn.style.display = 'block';
      dayCancelBtn.innerHTML = `적용 티켓 : ${dayAppliedCount}장 &nbsp;|&nbsp; 티켓 적용 취소`;
    } else {
      dayCancelBtn.style.display = 'none';
    }

    if (data.hourApplied) {
      hourCancelBtn.style.display = 'block';
      hourCancelBtn.innerHTML = `적용 티켓 : ${hourAppliedCount}장 &nbsp;|&nbsp; 티켓 적용 취소`;
    } else {
      hourCancelBtn.style.display = 'none';
    }

    resetTicketUI();
    document.getElementById('searchResult').style.display = 'block';
  }

  function unmatchHousehold() {
    if (!selectedParkingId) return;
    if (!confirm('내 손님 등록을 해제하시겠습니까?\n적용된 티켓이 있으면 자동으로 복구됩니다.')) return;

    fetch(`${contextPath}parking/ticket/unmatch`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        [csrfHeader]: csrfToken
      },
      body: JSON.stringify({ parkingId: selectedParkingId })
    })
      .then(async res => {
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.message || '서버 오류');
        }
        alert('내 손님 등록이 해제되었습니다.');
        document.getElementById('searchResult').style.display = 'none';
        document.getElementById('vehicleNumber').value = '';
        selectedParkingId = null;
      })
      .catch(err => {
        console.error(err);
        alert('해제 중 오류가 발생했습니다: ' + err.message);
      });
  }

  function openCancelModal(type, btn) {
    cancelType = type;
    cancelBtn = btn;
    cancelMaxCount = type === 'DAY' ? dayAppliedCount : hourAppliedCount;

    document.getElementById('cancelModalTitle').textContent =
      type === 'DAY' ? '1일권 취소' : '1시간권 취소';
    document.getElementById('cancelMaxCount').textContent = cancelMaxCount;
    document.getElementById('cancelCount').value = cancelMaxCount;
    document.getElementById('cancelModal').style.display = 'flex';
  }

  function closeCancelModal() {
    document.getElementById('cancelModal').style.display = 'none';
    cancelType = null;
    cancelBtn = null;
  }

  function increaseCancelCount() {
    let val = parseInt(document.getElementById('cancelCount').value);
    if (val < cancelMaxCount) {
      document.getElementById('cancelCount').value = val + 1;
    }
  }

  function decreaseCancelCount() {
    let val = parseInt(document.getElementById('cancelCount').value);
    if (val > 1) {
      document.getElementById('cancelCount').value = val - 1;
    }
  }

  function confirmCancel() {
    const count = parseInt(document.getElementById('cancelCount').value);
    const type = cancelType;
    const btn = cancelBtn;
    closeCancelModal();
    cancelTicket(type, btn, count);
  }

  function toMinutes(text) {
    const hourMatch = text.match(/(\d+)시간/);
    const minMatch = text.match(/(\d+)분/);
    const hours = hourMatch ? parseInt(hourMatch[1]) : 0;
    const mins = minMatch ? parseInt(minMatch[1]) : 0;
    return hours * 60 + mins;
  }

  function updateNeededTime() {
    const totalText = document.getElementById('totalTime').textContent;
    const appliedText = document.getElementById('appliedTime').textContent;

    const totalMinutes = toMinutes(totalText);
    const appliedMinutes = toMinutes(appliedText);

    let addMinutes = 0;
    if (selectedTicketType === 'DAY') {
      addMinutes = ticketCount * 1440;
    } else {
      addMinutes = ticketCount * 60;
    }

    const newApplied = appliedMinutes + addMinutes;
    const needed = Math.max(0, totalMinutes - newApplied);
    const h = Math.floor(needed / 60);
    const m = needed % 60;

    const neededEl = document.getElementById('neededTime');
    const neededMsgEl = document.getElementById('neededTimeMsg');
    if (needed === 0) {
      neededEl.textContent = '0분';
      neededEl.style.color = 'var(--color-sub)';
      neededMsgEl.textContent = '티켓 적용하면 출차 가능';
      neededMsgEl.style.color = 'var(--color-sub)';
    } else {
      neededEl.textContent = (h > 0 ? `${h}시간 ${m}분` : `${m}분`) + ' 부족';
      neededEl.style.color = 'var(--color-btn-point)';
      neededMsgEl.textContent = '';
    }
  }

  function handleCountInput(input) {
    let val = parseInt(input.value);
    if (isNaN(val) || val < 1) val = 1;
    if (val > maxCount) val = maxCount;
    input.value = val;
    ticketCount = val;
    updateNeededTime();
  }

  function selectTicket(type) {
    selectedTicketType = type;
    ticketCount = 1;
    document.getElementById('ticketCount').value = 1;
    document.getElementById('ticketHint').textContent = '';

    if (type === 'DAY') {
      maxCount = dayRemainingCount;
    } else {
      maxCount = hourRemainingCount;
    }

    document.getElementById('applyBtn').disabled = false;
    updateNeededTime();
  }

  function increaseCount() {
    if (ticketCount < maxCount) {
      ticketCount++;
      document.getElementById('ticketCount').value = ticketCount;
      updateNeededTime();
    }
  }

  function decreaseCount() {
    if (ticketCount > 1) {
      ticketCount--;
      document.getElementById('ticketCount').value = ticketCount;
      updateNeededTime();
    }
  }

  function resetTicketUI() {
    selectedTicketType = null;
    ticketCount = 1;
    document.getElementById('ticketCount').value = 1;
    document.querySelectorAll('input[name="ticketType"]').forEach(r => r.checked = false);
    document.getElementById('applyBtn').disabled = true;
    document.getElementById('ticketHint').textContent = '';

    // neededTime 원래 서버값으로 복구
    const neededEl = document.getElementById('neededTime');
    neededEl.textContent = currentNeededTime ?? '0분';
    neededEl.style.color = 'var(--color-btn-point)';
    document.getElementById('neededTimeMsg').textContent = '';
  }

  function applyTicket(btn) {
    if (!selectedParkingId || !selectedTicketType) return;

    btn.disabled = true;

    fetch(`${contextPath}parking/ticket/apply`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        [csrfHeader]: csrfToken
      },
      body: JSON.stringify({
        parkingId: selectedParkingId,
        ticketType: selectedTicketType,
        count: ticketCount
      })
    })
      .then(async res => {
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.message || '서버 오류');
        }
        alert('티켓이 적용되었습니다.');
        refreshCurrentVehicle();
      })
      .catch(err => {
        console.error(err);
        alert('티켓 적용 중 오류가 발생했습니다: ' + err.message);
      })
      .finally(() => {
        btn.disabled = false;
      });
  }

  function cancelTicket(type, btn, count) {
    if (btn) btn.disabled = true;

    fetch(`${contextPath}parking/ticket/cancel`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        [csrfHeader]: csrfToken
      },
      body: JSON.stringify({
        parkingId: selectedParkingId,
        ticketType: type,
        count: count
      })
    })
      .then(async res => {
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.message || '서버 오류');
        }
        alert('티켓 적용이 취소되었습니다.');
        refreshCurrentVehicle();
      })
      .catch(err => {
        console.error(err);
        alert('취소 처리 중 오류가 발생했습니다: ' + err.message);
      })
      .finally(() => {
        if (btn) btn.disabled = false;
      });
  }

  function goRegister() {
    const vehicleNumber = document.getElementById('resultVehicleNumber').textContent;
    location.href = `${contextPath}parking/unregistered?vehicleNumber=${encodeURIComponent(vehicleNumber)}`;
  }

  async function loadMyVehicles() {
    const res = await fetch(`${contextPath}parking/ticket/my-vehicles`);
    const data = await res.json();
    if (data.length > 0) {
      if (data.length === 1) {
        renderTicketUI(data[0]);
      } else {
        const selectList = document.getElementById('vehicleSelectList');
        data.forEach(vehicle => {
          const div = document.createElement('div');
          div.classList.add('result-item');
          div.style.cursor = 'pointer';
          div.innerHTML = `<p style="margin:0;">
            <strong>${vehicle.vehicleNumber}</strong>
            &nbsp;|&nbsp; 입차 ${vehicle.entryTime}
            ${vehicle.unregistered ? '&nbsp;|&nbsp; <span style="color:var(--color-btn-point);">미등록 차량</span>' : ''}
          </p>`;
          div.addEventListener('click', () => {
            document.getElementById('vehicleSelectBox').style.display = 'none';
            renderTicketUI(vehicle);
          });
          selectList.appendChild(div);
        });
        document.getElementById('vehicleSelectBox').style.display = 'block';
      }
    }
  }

  document.addEventListener('DOMContentLoaded', loadMyVehicles);
</script>

</body>
</html>
