<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('월별 주차 기록')}"></head>
<link rel="stylesheet" th:href="@{/css/parking/parking-common.css}">
<link rel="stylesheet" th:href="@{/css/parking/parking-resident.css}">
<body>

<div class="main-layout" style="display: flex; min-height: 100vh;">

  <!-- 1. 사이드바 -->
  <div th:replace="~{fragments/sidebar :: sidebar(currentPage='parking')}"></div>

  <!-- 2. 오른쪽 영역 -->
  <div class="main-wrapper">

    <!-- 상단 헤더 -->
    <div th:replace="~{fragments/headerCurrentMenuView :: path(paths='parking')}"></div>

    <!-- 상단 메뉴 -->
    <div th:replace="~{fragments/headerCategoryMenu :: parking}"></div>

    <!-- 본문 -->
    <main class="content" style="flex: 1;">
      <div class="container">
        <h2 class="page-title">월별 주차 기록</h2>

        <!-- 년/월 필터 -->
        <div class="pk-filter-group">
          <div class="pk-dropdown-wrapper">
            <button type="button" class="pk-dropdown-btn" onclick="toggleYearDropdown()">
              <span id="selectedYear"></span> ▼
            </button>
            <div id="yearDropdown" class="pk-dropdown-menu" style="display:none;">
              <ul id="yearList"></ul>
            </div>
          </div>

          <div class="pk-dropdown-wrapper">
            <button type="button" class="pk-dropdown-btn" onclick="toggleMonthDropdown()">
              <span id="selectedMonth"></span> ▼
            </button>
            <div id="monthDropdown" class="pk-dropdown-menu" style="display:none;">
              <ul id="monthList"></ul>
            </div>
          </div>
        </div>

        <!-- 주차 기록 테이블 -->
        <table class="park-table">
          <thead>
          <tr>
            <th>차량 번호</th>
            <th>구분</th>
            <th>입차 시간</th>
            <th>출차 시간</th>
            <th>정산 내역</th>
          </tr>
          </thead>
          <tbody id="parkingList">
          <tr>
            <td colspan="5" class="pk-empty">주차 기록이 없습니다.</td>
          </tr>
          </tbody>
        </table>

        <!-- 페이지네이션 -->
        <ul class="pk-pagination" id="pagination"></ul>

      </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

  </div>
</div>

<script th:inline="javascript">
  const contextPath = /*[[@{/}]]*/ '/';
  const YEARS  = [2026, 2025, 2024, 2023, 2022, 2021, 2020];
  const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const TODAY  = new Date();
  const PAGE_SIZE = 10;

  let selectedYear  = TODAY.getFullYear();
  let selectedMonth = TODAY.getMonth() + 1;
  let currentPage   = 0;

  document.getElementById('selectedYear').textContent  = `${selectedYear}년`;
  document.getElementById('selectedMonth').textContent = `${selectedMonth}월`;

  const yearList = document.getElementById('yearList');
  YEARS.forEach(y => {
    const li = document.createElement('li');
    li.textContent = `${y}년`;
    li.addEventListener('click', () => {
      selectedYear = y;
      document.getElementById('selectedYear').textContent = `${y}년`;
      toggleYearDropdown();
      currentPage = 0;
      loadParkingLogs();
    });
    yearList.appendChild(li);
  });

  const monthList = document.getElementById('monthList');
  MONTHS.forEach((m, index) => {
    const li = document.createElement('li');
    li.textContent = m;
    li.addEventListener('click', () => {
      selectedMonth = index + 1;
      document.getElementById('selectedMonth').textContent = m;
      toggleMonthDropdown();
      currentPage = 0;
      loadParkingLogs();
    });
    monthList.appendChild(li);
  });

  function closeAllDropdowns() {
    document.getElementById('yearDropdown').style.display  = 'none';
    document.getElementById('monthDropdown').style.display = 'none';
  }

  function toggleYearDropdown() {
    const dd = document.getElementById('yearDropdown');
    const isOpen = dd.style.display !== 'none';
    closeAllDropdowns();
    if (!isOpen) dd.style.display = 'block';
  }

  function toggleMonthDropdown() {
    const dd = document.getElementById('monthDropdown');
    const isOpen = dd.style.display !== 'none';
    closeAllDropdowns();
    if (!isOpen) dd.style.display = 'block';
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.pk-dropdown-wrapper')) closeAllDropdowns();
  });

  function loadParkingLogs() {
    fetch(`${contextPath}parking/logs/data?year=${selectedYear}&month=${selectedMonth}&page=${currentPage}&size=${PAGE_SIZE}`)
            .then(res => {
              if (!res.ok) throw new Error('서버 오류');
              return res.json();
            })
            .then(data => {
              renderTable(data.content);
              renderPagination(data.page.totalPages);
            })
            .catch(err => {
              console.error(err);
              alert('데이터 조회 중 오류가 발생했습니다.');
            });
  }

  function renderTable(content) {
    const tbody = document.getElementById('parkingList');
    tbody.innerHTML = '';

    if (!content || content.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="pk-empty">주차 기록이 없습니다.</td></tr>';
      return;
    }

    content.forEach(log => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${log.vehicleNumber}</td>
        <td>${log.entryType}</td>
        <td>${log.entryTime}</td>
        <td>${log.exitTime}</td>
        <td>${log.settlement}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function renderPagination(totalPages) {
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = '';

    if (totalPages <= 0) return;

    const prevLi = document.createElement('li');
    const prevA  = document.createElement('a');
    prevA.textContent = '‹';
    prevA.href = '#';
    if (currentPage === 0) prevA.style.opacity = '0.4';
    prevA.addEventListener('click', (e) => {
      e.preventDefault();
      if (currentPage > 0) { currentPage--; loadParkingLogs(); }
    });
    prevLi.appendChild(prevA);
    pagination.appendChild(prevLi);

    const startPage = Math.max(0, currentPage - 2);
    const endPage   = Math.min(totalPages - 1, startPage + 4);

    for (let i = startPage; i <= endPage; i++) {
      const li = document.createElement('li');
      const a  = document.createElement('a');
      a.textContent = i + 1;
      a.href = '#';
      if (i === currentPage) li.classList.add('active');
      a.addEventListener('click', (e) => {
        e.preventDefault();
        currentPage = i;
        loadParkingLogs();
      });
      li.appendChild(a);
      pagination.appendChild(li);
    }

    const nextLi = document.createElement('li');
    const nextA  = document.createElement('a');
    nextA.textContent = '›';
    nextA.href = '#';
    if (currentPage === totalPages - 1) nextA.style.opacity = '0.4';
    nextA.addEventListener('click', (e) => {
      e.preventDefault();
      if (currentPage < totalPages - 1) { currentPage++; loadParkingLogs(); }
    });
    nextLi.appendChild(nextA);
    pagination.appendChild(nextLi);
  }

  loadParkingLogs();
</script>

</body>
</html>
