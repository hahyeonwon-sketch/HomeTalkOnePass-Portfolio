<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('수동 입차')}"></head>
<link rel="stylesheet" th:href="@{/css/dashboard/style.css}">
<link rel="stylesheet" th:href="@{/css/parking/parking-common.css}">
<link rel="stylesheet" th:href="@{/css/parking/parking-staff.css}">
<body>

<div class="main-layout">

  <div th:replace="~{fragments/sidebar :: sidebar(currentPage='manualEntry')}"></div>

  <div class="main-wrapper" style="flex:1; display:flex; flex-direction:column;">

    <main class="content" style="flex:1;">
      <div class="container">
        <h2 class="page-title">수동 입차</h2>

        <!-- 방문 종류 -->
        <div class="form-group">
          <label>방문 종류</label>
          <div class="type-group">
            <button type="button" class="type-btn" data-type="택배">택배</button>
            <button type="button" class="type-btn" data-type="방문">방문</button>
            <button type="button" class="type-btn" data-type="기타">기타</button>
          </div>
          <input type="hidden" id="purposeType">
          <span class="error-msg" id="purposeTypeError"></span>
        </div>

        <!-- 방문 세대 -->
        <div class="form-group">
          <label>방문 세대 <span style="font-size:12px;color:#999">(모를 경우 생략 가능)</span></label>
          <div class="household-group">
            <input type="text" id="dong" placeholder="예) 101">
            <input type="text" id="ho" placeholder="예) 101">
          </div>
          <span class="error-msg" id="householdError"></span>
        </div>

        <!-- 차량 번호 -->
        <div class="form-group">
          <label for="vehicleNumber">차량 번호</label>
          <input type="text" id="vehicleNumber" placeholder="예) 000가 0000" maxlength="10">
          <span class="error-msg" id="vehicleNumberError"></span>
        </div>

        <!-- 버튼 -->
        <div class="form-actions">
          <button type="button" class="btn-cancel" onclick="goBack()">취소</button>
          <button type="button" id="submitBtn" class="pk-btn pk-btn-primary" disabled onclick="processManualEntry()">입차 처리</button>
        </div>

      </div>
    </main>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

  </div>
</div>

<script th:inline="javascript">
  const contextPath = /*[[@{/}]]*/ '/';
  const csrfToken = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
  const vehicleNumberRegex = /^\d{2,3}[가-힣]\d{4}$/;

  const typeBtns = document.querySelectorAll('.type-btn');
  const purposeTypeInput = document.getElementById('purposeType');

  typeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      typeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      purposeTypeInput.value = btn.dataset.type;
      document.getElementById('purposeTypeError').textContent = '';
      checkSubmitBtn();
    });
  });

  document.getElementById('dong').addEventListener('input', checkSubmitBtn);
  document.getElementById('ho').addEventListener('input', checkSubmitBtn);

  document.getElementById('vehicleNumber').addEventListener('input', () => {
    const value = document.getElementById('vehicleNumber').value.replace(/\s/g, '').toUpperCase();
    document.getElementById('vehicleNumber').value = value;
    const error = document.getElementById('vehicleNumberError');
    if (value && !vehicleNumberRegex.test(value)) {
      error.textContent = '올바른 차량 번호 형식이 아닙니다. (예: 123가4567)';
    } else {
      error.textContent = '';
    }
    checkSubmitBtn();
  });

  function checkSubmitBtn() {
    const purposeType = purposeTypeInput.value;
    const vehicleNumber = document.getElementById('vehicleNumber').value.replace(/\s/g, '');
    document.getElementById('submitBtn').disabled = !(purposeType && vehicleNumberRegex.test(vehicleNumber));
  }

  function goBack() {
    location.href = `${contextPath}staff/entry`;
  }

  function processManualEntry() {
    const btn = document.getElementById('submitBtn');
    const purposeType = purposeTypeInput.value;
    const dong = document.getElementById('dong').value.trim();
    const ho = document.getElementById('ho').value.trim();
    const vehicleNumber = document.getElementById('vehicleNumber').value.replace(/\s/g, '');

    if (!purposeType) { document.getElementById('purposeTypeError').textContent = '방문 종류를 선택해주세요.'; return; }
    if ((dong && !ho) || (!dong && ho)) { document.getElementById('householdError').textContent = '동과 호수를 모두 입력해주세요.'; return; }
    document.getElementById('householdError').textContent = '';
    btn.disabled = true;

    fetch(`${contextPath}staff/vehicle/manual-entry`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
      body: JSON.stringify({ purposeType, dong: dong || null, ho: ho || null, vehicleNumber })
    })
      .then(async res => { if (!res.ok) { const data = await res.json(); throw new Error(data.message || '서버 오류'); } alert('수동 입차 처리가 완료되었습니다.'); location.href = `${contextPath}staff/entry`; })
      .catch(err => { console.error(err); alert(err.message || '입차 처리 중 오류가 발생했습니다.'); })
      .finally(() => { btn.disabled = false; });
  }
</script>

</body>
</html>
