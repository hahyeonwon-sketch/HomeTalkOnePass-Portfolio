<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head('방문 차량 예약')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/parking/parking-common.css}">
    <link rel="stylesheet" th:href="@{/css/parking/parking-resident.css}">
</head>

<div class="main-layout" style="display: flex; min-height: 100vh;">

    <!-- 1. 왼쪽 사이드바 -->
    <div th:replace="~{fragments/sidebar :: sidebar(currentPage='parking')}"></div>

    <!-- 2. 오른쪽 영역 (헤더 + 본문) -->
    <div class="main-wrapper" style="flex: 1; display: flex; flex-direction: column;">

        <!-- 상단 헤더 -->
        <div th:replace="~{fragments/headerCurrentMenuView :: path(paths='parking')}"></div>

        <!-- 상단 메뉴 -->
        <div th:replace="~{fragments/headerCategoryMenu :: parking}"></div>

        <!-- 메인 콘텐츠 -->
        <main class="content" style="flex: 1;">
            <div class="container">

                <!-- 상단 타이틀 + 예약하기 버튼 -->
                <div class="page-header">
                    <h2 class="page-title">방문 차량 예약</h2>
                    <button type="button"
                            th:onclick="'location.href=\'' + @{/parking/visit/register} + '\''">+ 예약하기</button>
                </div>

                <!-- 안내 멘트 -->
                <div style="background-color: #f0f5ff; border: 1px solid #d0dff8; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #3C6ABC; display: flex; align-items: flex-start; gap: 8px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3C6ABC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 2px;">
                        <path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/>
                        <path d="M12 8v4"/>
                        <path d="M12 16h.01"/>
                    </svg>
                    <span>
                    방문 차량은 예약 시간 <strong>30분 전후</strong>에만 입차 가능합니다.<br>
                    입차하지 못하셨다면 다시 예약해 주시기 바랍니다.<br>
                    입차 후 <strong>10분</strong> 이내에는 무료 출차 가능합니다.
                    </span>
                </div>

                <!-- 예약 목록 테이블 -->
                <table class="park-table" id="reservationTable">
                    <thead>
                    <tr>
                        <th>차량 번호</th>
                        <th>방문 목적</th>
                        <th>방문 예정 시각</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                    </thead>
                    <tbody id="reservationtbody">
                    <!-- 예약 없을 때 -->
                    <tr th:if="${#lists.isEmpty(reservations)}">
                        <td colspan="5" class="pk-empty">예약된 방문 차량이 없습니다.</td>
                    </tr>
                    <!-- 예약 목록 -->
                    <tr th:each="reservation : ${reservations}"
                        th:id="'row-' + ${reservation.reservationId}">
                        <td th:text="${reservation.vehicleNumber}"></td>
                        <td th:text="${reservation.purpose}"></td>
                        <td th:text="${#temporals.format(reservation.reservedAt, 'yyyy.MM.dd HH:mm')}"></td>
                        <td>
                            <span th:text="${reservation.status}"
                                  th:class="${reservation.status == '예약중'} ? 'status reserved' :
                                            (${reservation.status == '입차완료'} ? 'status entered' : 'status cancelled')">
                            </span>
                        </td>
                        <td>
                            <th:block th:if="${reservation.status == '예약중'}">
                                <button type="button"
                                        th:onclick="'location.href=\'' + @{/parking/visit/update/} + ${reservation.reservationId} + '\''">
                                    수정
                                </button>
                                <button type="button" class="cancel-btn"
                                        th:attr="data-id=${reservation.reservationId}"
                                        onclick="cancelReservation(this)">취소</button>
                            </th:block>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </main>

        <!-- 하단 푸터 삽입 -->
        <footer th:replace="~{fragments/footer :: footer}"></footer>

    </div>
</div>

<script th:inline="javascript">
    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const contextPath = /*[[@{/}]]*/ '/';

    function cancelReservation(btn) {
        const reservationId = btn.getAttribute('data-id');
        if (!confirm('예약을 취소하시겠습니까?')) return;

        fetch(`${contextPath}parking/visit/cancel/${reservationId}`, {
            method: 'POST',
            headers: {
                [csrfHeader]: csrfToken
            }
        }).then(async res => {
            if (res.ok) {
                const row = document.getElementById(`row-${reservationId}`);
                if (!row) return;
                const statusCell = row.querySelector('td:nth-child(4) span');
                const actionCell = row.querySelector('td:nth-child(5)');
                statusCell.textContent = '취소됨';
                statusCell.className = 'status cancelled';
                actionCell.innerHTML = '';
            } else {
                const msg = await res.text();
                alert(msg || '취소 처리 중 오류가 발생했습니다.');
            }
        }).catch(err => {
            console.error(err);
            alert('취소 처리 중 오류가 발생했습니다.');
        });
    }
</script>

</body>
</html>
